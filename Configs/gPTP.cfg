#
# 802.1AS configuration
#

[global]
assume_two_step		1
clock_type		RELAY
delay_mechanism		P2P
follow_up_info		1
free_running		1
freq_est_interval	3
min_neighbor_prop_delay	-20000000
network_transport	L2
path_trace_enabled	1
phc_index		0
priority1		248
priority2		248
ptp_dst_mac		01:80:C2:00:00:0E
ptp_minor_version	0
sanity_freq_limit	0
step_threshold		1
tc_spanning_tree	1
tx_timestamp_timeout	1000

allowedLostResponses	9
announceReceiptTimeout	10
gmCapable		1
logAnnounceInterval	0
logSyncInterval		-3
neighborPropDelayThresh	800
syncReceiptTimeout	3
transportSpecific	1

# Interfaces are supplied on the ptp4l command line (-i) from $INTERFACES in
# /etc/default/avb. Add per-interface sections here only for per-port overrides
# (e.g. "serverOnly 1" on an uplink port).
